<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Herramientas | Kazuma API</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.google.com/recaptcha/api.js?render=6Lfw-dwsAAAAACc6y5K4sfFnplSqbskYPia1ADh5"></script>

    <style>
        :root { --neon-blue: #00f3ff; --dark-bg: #09090b; --card-bg: #11111d; --text-main: #ffffff; --code-bg: #05050a; }
        body { background-color: var(--dark-bg); color: var(--text-main); font-family: 'Inter', sans-serif; }
        #safety-block { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .glass { background: var(--card-bg); border: 1px solid rgba(0, 243, 255, 0.1); border-radius: 24px; }
        .code-box { background: var(--code-bg); padding: 12px; border-radius: 12px; font-family: monospace; font-size: 0.7rem; color: var(--neon-blue); border: 1px solid rgba(0,243,255,0.1); word-break: break-all; margin: 15px 0; }
        .input-test, select { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); padding: 14px; border-radius: 12px; color: #fff; outline: none; margin-bottom: 10px; font-size: 0.8rem; }
        .btn-test { background: var(--neon-blue); color: #000; border: none; padding: 14px; width: 100%; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        .img-result { width: 100%; border-radius: 15px; border: 2px solid var(--neon-blue); display: none; margin-top: 15px; }
        h2 { border-left: 5px solid var(--neon-blue); padding-left: 15px; font-weight: 900; }
        .grecaptcha-badge { width: 70px !important; overflow: hidden !important; transition: 0.3s !important; right: 0px !important; bottom: 20px !important; z-index: 9999 !important; }
    </style>
</head>
<body class="min-h-screen pb-10">
    <div id="safety-block"></div>
    <header class="p-4 flex justify-between items-center sticky top-0 z-50 bg-[#09090b]/80 backdrop-blur-md border-b border-white/5">
        <div class="font-black text-xl tracking-tighter cursor-pointer" onclick="location.href='/dash'">KAZUMA <span style="color: var(--neon-blue)">DASH</span></div>
        <button onclick="location.href='/dash'" class="text-xs font-bold bg-white/5 px-4 py-2 rounded-xl border border-white/10"><i class="fas fa-home"></i></button>
    </header>

    <main class="container mx-auto p-4 max-w-2xl">
        <h2 class="text-xl uppercase tracking-tighter my-6">Herramientas</h2>

        <div class="glass p-6 mb-6">
            <div class="font-bold text-sm uppercase mb-2"><i class="fas fa-camera text-cyan-400"></i> Screenshot Web</div>
            <div class="code-box" id="ss-path">GET /api/tools/ssweb?apiKey=</div>
            
            <input id="url-ss" class="input-test" placeholder="URL del sitio...">
            <div class="grid grid-cols-2 gap-3">
                <select id="device-ss"><option value="desktop">Escritorio</option><option value="tablet">Tablet</option><option value="phone">Móvil</option></select>
                <select id="theme-ss"><option value="dark">Dark</option><option value="light">Light</option></select>
            </div>
            <button class="btn-test" onclick="testMedia('ssweb')">Capturar Pantalla</button>
            <img id="view-ssweb" class="img-result">
        </div>

        <div class="glass p-6 mb-6">
            <div class="font-bold text-sm uppercase mb-2"><i class="fas fa-qrcode text-cyan-400"></i> QR Generator</div>
            <div class="code-box" id="qr-path">GET /api/tools/qr?apiKey=</div>
            <input id="text-qr" class="input-test" placeholder="Texto o URL...">
            <button class="btn-test" onclick="testMedia('qr')">Generar QR</button>
            <div class="text-center"><img id="view-qr" class="img-result mx-auto !w-48"></div>
        </div>
    </main>

    <script>
        const userData = JSON.parse(localStorage.getItem('kazuma_user'));
        if (!userData) { window.location.href = '/login'; }
        else {
            document.addEventListener("DOMContentLoaded", () => {
                document.getElementById('ss-path').innerText += `${userData.key}&url=...&device=...&theme=...`;
                document.getElementById('qr-path').innerText += `${userData.key}&text=...`;
                setTimeout(() => document.getElementById('safety-block').style.display='none', 300);
            });
        }

        async function testMedia(type) {
            const imgEl = document.getElementById(`view-${type}`);
            let finalUrl = "";

            if(type === 'ssweb') {
                const u = document.getElementById('url-ss').value;
                const d = document.getElementById('device-ss').value;
                const t = document.getElementById('theme-ss').value;
                if(!u) return;
                finalUrl = `/api/tools/ssweb?url=${encodeURIComponent(u)}&device=${d}&theme=${t}&apiKey=${userData.key}`;
            } else {
                const txt = document.getElementById('text-qr').value;
                if(!txt) return;
                finalUrl = `/api/tools/qr?text=${encodeURIComponent(txt)}&apiKey=${userData.key}`;
            }

            Swal.fire({ title: 'Procesando...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            imgEl.src = finalUrl;
            imgEl.onload = () => { imgEl.style.display = 'block'; Swal.close(); };
        }
        window.onload = () => { grecaptcha.ready(() => { grecaptcha.execute('6Lfw-dwsAAAAACc6y5K4sfFnplSqbskYPia1ADh5', {action: 'tools_test'}); }); };
    </script>
</body>
</html>
