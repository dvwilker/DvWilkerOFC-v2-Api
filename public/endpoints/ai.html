<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IA | Kazuma API</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.google.com/recaptcha/api.js?render=6Lfw-dwsAAAAACc6y5K4sfFnplSqbskYPia1ADh5"></script>

    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --dark-bg: #09090b; 
            --card-bg: #11111d; 
            --text-main: #ffffff; 
            --code-bg: #05050a;
            --transition: 0.2s ease;
        }

        body.light-mode {
            --dark-bg: #f4f4f9;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --code-bg: #e8e8ef;
        }

        #safety-block { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }

        body { background-color: var(--dark-bg); color: var(--text-main); font-family: 'Inter', sans-serif; transition: background-color var(--transition); }

        .glass { background: var(--card-bg); border: 1px solid rgba(0, 243, 255, 0.1); border-radius: 24px; position: relative; }
        
        .code-box { 
            background: var(--code-bg); padding: 12px; border-radius: 12px; 
            font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; 
            color: var(--neon-blue); border: 1px solid rgba(0,243,255,0.1); 
            word-break: break-all; margin: 15px 0;
        }

        .input-test { 
            width: 100%; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); 
            padding: 14px; border-radius: 12px; color: var(--text-main); outline: none; font-size: 0.8rem;
        }
        body.light-mode .input-test { background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.1); }

        .btn-test { 
            background: var(--neon-blue); color: #000; border: none; padding: 14px; 
            width: 100%; border-radius: 12px; font-weight: 900; text-transform: uppercase; 
            cursor: pointer; transition: 0.3s; font-size: 0.75rem;
        }
        .btn-test:hover { filter: brightness(1.2); transform: scale(1.01); }

        .result-box { 
            background: var(--code-bg); color: #00ffcc; padding: 15px; border-radius: 12px; 
            margin-top: 15px; font-size: 0.7rem; font-family: monospace; 
            border: 1px solid rgba(0, 255, 204, 0.1); white-space: pre-wrap; 
            word-break: break-all; max-height: 400px; overflow-y: auto; display: none;
        }

        .btn-copy-json {
            background: rgba(255, 255, 255, 0.05); color: var(--text-main);
            width: 100%; padding: 10px; border-radius: 0 0 15px 15px;
            font-size: 10px; font-weight: 800; border-top: 1px solid rgba(255,255,255,0.05);
            display: none; cursor: pointer; transition: 0.3s;
        }
        .btn-copy-json:hover { background: rgba(0, 243, 255, 0.1); color: var(--neon-blue); }

        h2 { border-left: 5px solid var(--neon-blue); padding-left: 15px; font-weight: 900; }
        header { background: rgba(12, 12, 20, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0, 243, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen pb-10">
    <div id="safety-block"></div>

    <header class="p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="font-black text-xl tracking-tighter cursor-pointer" onclick="location.href='/dash'">
            KAZUMA <span style="color: var(--neon-blue)">DASH</span>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-xl cursor-pointer" style="color: var(--neon-blue)" onclick="toggleTheme()" id="theme-btn">
                <i class="fas fa-moon"></i>
            </div>
            <button onclick="location.href='/dash'" class="text-xs font-bold bg-white/5 px-4 py-2 rounded-xl border border-white/10">
                <i class="fas fa-home"></i>
            </button>
        </div>
    </header>

    <main class="container mx-auto p-4 max-w-2xl">
        <h2 class="text-xl uppercase tracking-tighter my-6">Inteligencia Artificial</h2>

        <div class="glass p-6 mb-1 overflow-hidden">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-2 font-bold text-sm uppercase">
                    <i class="fas fa-robot text-cyan-400"></i> Google Gemini
                </div>
                <span class="text-[10px] bg-cyan-500/10 text-cyan-400 px-2 py-1 rounded font-black">AI MODEL</span>
            </div>

            <div class="code-box" id="gemini-path">GET /api/ai/gemini?apiKey=</div>
            
            <div class="space-y-3">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Cookie de Sesión</label>
                    <input id="cookie-gemini" class="input-test" value="cokie" placeholder="Tu session cookie...">
                </div>
                
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Texto (Mensaje)</label>
                    <textarea id="text-gemini" class="input-test h-24 resize-none" placeholder="Escribe algo para Gemini..."></textarea>
                </div>

                <button class="btn-test mt-2" onclick="testAi('gemini', '/api/ai/gemini')">Ejecutar Gemini</button>
            </div>

            <div id="res-gemini" class="result-box"></div>
        </div>
        <button id="copy-gemini" class="btn-copy-json mb-6" onclick="copyResult('gemini')"><i class="fas fa-copy mr-2"></i> COPIAR RESPUESTA</button>
    </main>

    <script>
        const userData = JSON.parse(localStorage.getItem('kazuma_user'));
        
        if (!userData) {
            window.location.href = '/login';
        } else {
            document.addEventListener("DOMContentLoaded", () => {
                const pathEl = document.getElementById('gemini-path');
                // Ajustado al orden de tu ejemplo: apiKey, text, cookie
                if(pathEl) pathEl.innerText += `${userData.key}&text=...&cookie=...`;
                setTimeout(() => { document.getElementById('safety-block').style.display = 'none'; }, 300);
            });
        }

        function toggleTheme() {
            const body = document.body;
            const isLight = body.classList.toggle('light-mode');
            document.getElementById('theme-btn').querySelector('i').classList.replace(isLight ? 'fa-moon' : 'fa-sun', isLight ? 'fa-sun' : 'fa-moon');
            localStorage.setItem('kazuma-theme', isLight ? 'light' : 'dark');
        }

        async function testAi(id, route) {
            const textVal = document.getElementById(`text-gemini`).value.trim();
            const cookieVal = document.getElementById(`cookie-gemini`).value.trim();
            const resBox = document.getElementById(`res-${id}`);
            const copyBtn = document.getElementById(`copy-${id}`);
            
            if (!textVal) return Swal.fire({ icon: 'warning', title: 'Falta Texto', background: 'var(--card-bg)', color: 'var(--text-main)' });

            resBox.style.display = 'block';
            resBox.innerText = "PROCESANDO SOLICITUD...";
            copyBtn.style.display = 'none';

            try {
                // URL final siguiendo exactamente tu formato
                const url = `${route}?apiKey=${userData.key}&text=${encodeURIComponent(textVal)}&cookie=${encodeURIComponent(cookieVal)}`;
                const response = await fetch(url);
                const data = await response.json();
                
                resBox.innerText = JSON.stringify(data, null, 2);
                copyBtn.style.display = 'block';
            } catch (err) { 
                resBox.innerText = "ERROR DE RESPUESTA"; 
                copyBtn.style.display = 'block';
            }
        }

        function copyResult(id) {
            const text = document.getElementById(`res-${id}`).innerText;
            navigator.clipboard.writeText(text);
            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Copiado', showConfirmButton: false, timer: 1000, background: 'var(--card-bg)', color: 'var(--text-main)' });
        }

        window.onload = () => {
            if (localStorage.getItem('kazuma-theme') === 'light') toggleTheme();
            grecaptcha.ready(() => { grecaptcha.execute('6Lfw-dwsAAAAACc6y5K4sfFnplSqbskYPia1ADh5', {action: 'ai_test'}); });
        };
    </script>
</body>
</html>
