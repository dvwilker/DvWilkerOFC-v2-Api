<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DvWilkerOFC API | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- ✅ ELIMINADO: script de reCAPTCHA -->
    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --dark-bg: #0d0d0d; 
            --card-bg: #161625; 
            --text-main: #ffffff;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-mode {
            --dark-bg: #f4f4f9;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
        }

        body { 
            background: var(--dark-bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            transition: background var(--transition), color var(--transition);
        }

        /* Pantalla negra absoluta de seguridad */
        #safety-overlay { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; 
            z-index: 9999; 
        }

        .glass { 
            background: var(--card-bg); 
            border: 1px solid rgba(0, 243, 255, 0.1); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            transition: background var(--transition), border var(--transition);
        }

        body.light-mode .glass {
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .input-kazuma { 
            background: #080810; 
            border: 1px solid rgba(255,255,255,0.1); 
            color: #ffffff !important; 
            transition: 0.3s; 
        }

        body.light-mode .input-kazuma {
            background: #fdfdfd;
            border: 1px solid rgba(0,0,0,0.1);
            color: #1a1a1a !important;
        }

        .input-kazuma:focus { border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0, 243, 255, 0.2); }
        .btn-blue { background: var(--neon-blue); transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; font-weight: 900; color: #000; }
        .btn-blue:hover { filter: brightness(1.2); transform: translateY(-1px); }

        /* ✅ ELIMINADO: .g-recaptcha */

        .theme-btn-fixed {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: var(--card-bg);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--neon-blue);
            z-index: 1000;
            transition: var(--transition);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="safety-overlay"></div>

    <div class="theme-btn-fixed" onclick="toggleTheme()" id="theme-btn">
        <i class="fas fa-moon"></i>
    </div>

    <div class="glass p-8 rounded-3xl w-full max-w-md">
        <div class="text-center mb-6">
            <h2 class="text-3xl font-black tracking-tighter uppercase">DVWILKER <span style="color: var(--neon-blue);">API</span></h2>
            <p class="text-slate-500 text-[10px] mt-1 uppercase font-bold tracking-widest">Protocolo de Acceso Kurayami</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-[10px] font-black text-slate-500 mb-1 uppercase tracking-widest">Email</label>
                <input type="email" id="email" class="input-kazuma w-full rounded-xl p-4 outline-none" placeholder="admin@dvwilker.com" required>
            </div>
            <div class="relative">
                <label class="block text-[10px] font-black text-slate-500 mb-1 uppercase tracking-widest">Password</label>
                <input type="password" id="password" class="input-kazuma w-full rounded-xl p-4 outline-none" placeholder="••••••••" required>
                <i class="fas fa-eye absolute right-4 top-10 cursor-pointer text-slate-600" onclick="togglePassword('password', this)"></i>
            </div>

            <!-- ✅ ELIMINADO: div del reCAPTCHA -->

            <button type="submit" id="btnSubmit" class="btn-blue w-full py-4 rounded-xl shadow-lg font-black">
                Entrar al Sistema
            </button>
        </form>

        <div class="mt-6 text-center border-t border-white/5 pt-4">
            <p class="text-slate-500 text-sm">¿Nuevo en el protocolo? <a href="/register" class="font-bold" style="color: var(--neon-blue);">Crea tu cuenta</a></p>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const themeBtn = document.getElementById('theme-btn');
            const icon = themeBtn.querySelector('i');
            body.classList.toggle('light-mode');
            if (body.classList.contains('light-mode')) {
                icon.classList.replace('fa-moon', 'fa-sun');
                localStorage.setItem('kazuma-theme', 'light');
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
                localStorage.setItem('kazuma-theme', 'dark');
            }
        }

        // Blindaje de Seguridad Instantáneo
        (function initialCheck() {
            const user = localStorage.getItem('kazuma_user');
            const savedTheme = localStorage.getItem('kazuma-theme');

            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('theme-btn').querySelector('i').classList.replace('fa-moon', 'fa-sun');
            }

            // Redirección directa al Dash si ya hay sesión (Overlay permanece negro)
            if (user) {
                window.location.href = '/dash';
            } else {
                window.onload = () => { 
                    document.getElementById('safety-overlay').style.display = 'none'; 
                };
            }
        })();

        function togglePassword(id, el) {
            const input = document.getElementById(id);
            input.type = input.type === "password" ? "text" : "password";
            el.classList.toggle("fa-eye");
            el.classList.toggle("fa-eye-slash");
        }

        // ✅ Formulario SIN validación de reCAPTCHA
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerText = 'AUTENTICANDO...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                        // ✅ ELIMINADO: captcha: captchaResponse
                    })
                });

                const data = await res.json();
                if (data.status) {
                    localStorage.setItem('kazuma_user', JSON.stringify(data.data));
                    // Activar pantalla negra antes de redirigir
                    document.getElementById('safety-overlay').style.display = 'block';
                    window.location.href = '/dash';
                } else {
                    throw new Error(data.message || "Error de autenticación");
                }
            } catch (err) {
                Swal.fire({ title: 'Error', text: err.message, icon: 'error', background: 'var(--card-bg)', color: 'var(--text-main)' });
                btn.disabled = false;
                btn.innerText = 'Entrar al Sistema';
            }
        });
    </script>
</body>
</html>
