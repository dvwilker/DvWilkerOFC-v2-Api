<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 - No Encontrado | Api DvWilkerOFC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --dark-bg: #0d0d0d;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .error-container {
            padding: 20px;
        }

        .error-code {
            font-size: 120px;
            font-weight: 900;
            margin: 0;
            color: var(--neon-blue);
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
            line-height: 1;
        }

        h1 {
            font-size: 1.5rem;
            margin: 10px 0 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .btn-home {
            background: var(--neon-blue);
            color: #000;
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 12px;
            font-weight: 900;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 243, 255, 0.3);
        }

        .btn-home:hover {
            transform: translateY(-3px);
            filter: brightness(1.2);
            box-shadow: 0 6px 20px rgba(0, 243, 255, 0.5);
        }

        .footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        @media (max-width: 480px) {
            .error-code { font-size: 100px; }
            h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="error-container">
        <p class="error-code">404</p>
        <h1>Protocolo Interrumpido</h1>
        <p>El endpoint o la página que buscas no existe en el Sistema DvWilkerOFC v1.</p>

        <a href="/" class="btn-home">
            <i class="fas fa-home"></i> REGRESAR AL INICIO
        </a>
    </div>

    <footer class="footer">
        <p>Copyright © 2026 Api DvWilkerOFC. <br> DvWilkerOFC | ClanSurubiTeam</p>
    </footer>

</body>
</html>
